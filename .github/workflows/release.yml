name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_name:
        description: "Custom build name (e.g., dev-test, staging)"
        required: true
        default: "manual-build"

jobs:
  build:
    runs-on: ubuntu-latest

