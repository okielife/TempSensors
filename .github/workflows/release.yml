      - name: Build instruction manual
        working-directory: docs
        run: |
          pip install sphinx
          make latexpdf

      - name: Package instruction manual
        run: cp docs/_build/latex/assembly.pdf output/AssemblyInstructions.pdf

      - name: Upload instruction manual as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: instruction-manual
          path: output/AssemblyInstructions.pdf

      - name: Upload instructions to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: output/AssemblyInstructions.pdf

      - name: Upload 3D models as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3d-models
          path: model/*

      - name: Upload 3D models to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: model/*
